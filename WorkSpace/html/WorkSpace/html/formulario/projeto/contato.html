<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <link rel="stylesheet" href="contato.css">
</head>
<body>
    <form action="#" autocomplete="off">
        <fieldset>
            <legend>Formulário de contato</legend>
            <label for="name">Nome</label>
            <input type="text" name="name" id="name" required placeholder="Digite seu nome aqui">             
        </fieldset>

        <fieldset>
            <label for="email">Email</label>
            <input type="email" name="email" id="email" required placeholder="Digite seu email aqui">
        </fieldset>

        <fieldset>
            <label for="subject">Assunto</label>
            <input type="text" name="subject" id="subject">
        </fieldset>

        <fieldset>
            <label for="message">Mensagem</label>
            <input type="text" name="message" id="message" maxlength="1000" minlength="20" required placeholder="Digite sua mensagem aqui">
        </fieldset>

        <fieldset>
            <button id="btn">Enviar</button>
        </fieldset>
        
    </form>
    
</body>
</html>
