<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Z-index</title>
    <style>
        div{
            border: 3px solid black;
            padding: 10px;
            margin-bottom: 10px;
            background-color: gray;
            font-size: 20px;
            width: 60%;
        }

        .div2.grupo1{
            right: 0;
            background-color: white;
            z-index: 1;
        }
        .div2.grupo2{
            position: absolute;
            top: 0;
            right: 100px;
            background-color: white;
            z-index: 2;
        }

        .div3.grupo1{
            position: relative;
            background-color: red;
            z-index: 4;
        }
        .div4.grupo1{
            position: relative;
            background-color: yellow;
            bottom: 30px;
            left: 15px;
            z-index: 5;
        }
    </style>
      git config --global user.email "you@example.com"
        git config --global user.name "Your Name"
</head>
<body>
    <div class="div1 grupo1">
        div1 grupo1
        <div class="div2 grupo1">
            div2 grupo1
            <div class="div3 grupo1">
                div3 grupo1
            </div>
            <div class="div4 grupo1">
                div4 grupo1
            </div>
    </div>

    <div class="div1 grupo2">
        div1 grupo2
        <div class="div2 grupo2">
            div2 grupo2
            <div class="div3 grupo2">
                div3 grupo2
            </div>
            <div class="div4 grupo2">
                div4 grupo2
            </div>
    </div>
</body>
</html>
