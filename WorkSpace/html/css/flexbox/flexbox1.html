<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <style>
        .flex{
            height: 300px;
            border: 5px solid blue;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            flex-direction: row;
        }

        .flex div{
            border: 3px solid green;
            width: 250px;
            margin: 10px;
        }

        .flex-container1{
            flex-wrap: wrap;
            flex-direction: row;
        }

        .flex-container2 div{
            width: 30px;
            margin: 0;
        }.flex-container2{
            flex-direction: column;
            justify-content: space-evenly;
        }

        .flex-container3 div{
            width: 30px;
            margin: 0;
        }
        .flex-container3{
            flex-direction: row;
            justify-content: space-around;
            align-items: center;
        }

        .flex-container4 div{
            width: 150px;
            margin: 0;
        }
        .flex-container4{
            flex-direction: row;
            justify-content: center;
            flex-wrap: wrap;
            align-items: end;
        }
    </style>
<body>
    <div class="flex flex-container1">
        <div class="div1">div 1</div>
        <div class="div2">div 2</div>
        <div class="div3">div 3</div>
        <div class="div4">div 4</div>
    </div>

    <div class="flex flex-container2">
        <div class="div1">div 1</div>
        <div class="div2">div 2</div>
        <div class="div3">div 3</div>
    </div>

    <div class="flex flex-container3">
        <div class="div 1">div 1</div>
        <div class="div 2">div 2</div>
        <div class="div 3">div 3</div>
        <div class="div 4">div 4</div>
    </div>
    
    <div class="flex flex-container3">
        <div class="div1">div 1</div>
        <div class="div2">div 2</div>
        <div class="div3">div 3</div>
        <div class="div4">div 4</div>
    </div>
    
</body>
</html>
